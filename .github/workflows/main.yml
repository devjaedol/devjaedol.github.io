# This is a basic workflow to help you get started with Actions

name: Jekyll Source - Master 

on:
  push:
    branches: [ source ]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

#/home/runner/work/devjaedol.github.io/devjaedol.github.io
      - name: Run PWD
        run: pwd

      - name: Run ls -al
        run: ls -al

# Commit id => cea156d3c47dbbd70b84fb7518bdecbba36445ad
      - name: Check COMMIT_ID
        env : 
          COMMIT_ID : ${{github.sha}}
        run: echo "Commit id => $COMMIT_ID"

      - name: Cloning source branch
        uses: actions/checkout@v4
        with:
          ref: 'source'
          path: 'source'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: ./source

      - name: Build Jekyll site
        run: |
          cd source
          bundle install
          JEKYLL_ENV=production bundle exec jekyll build --future
        env:
          JEKYLL_ENV: production

      - name: Cloning master branch
        uses: actions/checkout@v4
        with:
          ref: 'master'
          path: 'master'

      - name: Run PWD
        run: pwd
      - name: Run ls -al master
        run: ls -al ./master
      - name: Run ls -al source
        run: ls -al ./source

      - name: Clean master branch (keep .git)
        run: |
          cd ${{ github.workspace }}/master
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' -exec rm -rf {} +

      - name: Copying _site content to master branch repo
        run: |
          cp -R ${{ github.workspace }}/source/_site/* ${{ github.workspace }}/master/
          cp -R ${{ github.workspace }}/source/_site/.* ${{ github.workspace }}/master/ 2>/dev/null || true
          touch ${{ github.workspace }}/master/.nojekyll

      - name: Run PWD
        run: pwd
      - name: Run ls -al master
        run: ls -al ./master
      - name: Run ls -al source
        run: ls -al ./source
      
      - name: Run ls -al master/nodejs
        run: ls -al ./master/nodejs || echo "nodejs directory not found"

      - name: Commit files
        run: |
          cd ${{ github.workspace }}/master
          git config --local user.email "devjaedol@gmail.com"
          git config --local user.name "JaeHyun Kim"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "GitHub Action CI - Build from ${{ github.sha }}"


      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          directory: ${{ github.workspace }}/master
          branch: 'master'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true
          
      - name: Run ls -al
        run: ls -al


